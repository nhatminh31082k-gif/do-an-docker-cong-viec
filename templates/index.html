<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Task Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #0f172a; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .progress { height: 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
        .task-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; transition: 0.3s; margin-bottom: 12px; }
        .task-item:hover { background: rgba(255,255,255,0.08); transform: scale(1.01); }
        .completed-text { text-decoration: line-through; color: #64748b !important; }
        .form-control, .form-select { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .form-control:focus { background: rgba(15, 23, 42, 0.8); color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-primary { background: #38bdf8; border: none; font-weight: 600; }
        .nav-pills .nav-link { color: #94a3b8; }
        .nav-pills .nav-link.active { background: #38bdf8; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="glass-card p-4 shadow-lg">
                    <h2 class="text-center mb-4 fw-bold text-info"><i class="fas fa-layer-group me-2"></i>TASK MASTER PRO</h2>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small">Tiến độ hoàn thành</span>
                            <span class="small fw-bold" id="progressText">0%</span>
                        </div>
                        <div class="progress">
                            <div id="progressBar" class="progress-bar bg-info" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="input-group mb-4 shadow-sm">
                        <input type="text" id="taskInput" class="form-control" placeholder="Thêm việc mới...">
                        <select id="priorityInput" class="form-select" style="max-width: 120px;">
                            <option value="Low">Thấp</option>
                            <option value="Normal" selected>Vừa</option>
                            <option value="High">Gấp!</option>
                        </select>
                        <button class="btn btn-primary px-4" onclick="addTask()"><i class="fas fa-paper-plane"></i></button>
                    </div>

                    <ul class="nav nav-pills nav-justified mb-4 p-1 bg-dark rounded-pill" style="--bs-bg-opacity: .5;">
                        <li class="nav-item"><a class="nav-link active small py-1" href="#" onclick="filterTasks('all', this)">Tất cả</a></li>
                        <li class="nav-item"><a class="nav-link small py-1" href="#" onclick="filterTasks('pending', this)">Đang làm</a></li>
                        <li class="nav-item"><a class="nav-link small py-1" href="#" onclick="filterTasks('done', this)">Đã xong</a></li>
                    </ul>

                    <div id="taskList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTasks = [];

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            allTasks = await res.json();
            updateUI(allTasks);
        }

        function updateUI(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            
            // Cập nhật tiến độ
            const completedCount = allTasks.filter(t => t.completed).length;
            const percent = allTasks.length > 0 ? Math.round((completedCount / allTasks.length) * 100) : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';

            tasks.forEach(t => {
                const priorityColor = t.priority === 'High' ? 'text-danger' : (t.priority === 'Normal' ? 'text-warning' : 'text-success');
                list.innerHTML += `
                    <div class="task-item p-3 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input border-info" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}', ${t.completed})">
                            </div>
                            <span class="ms-3 ${t.completed ? 'completed-text' : 'fw-medium'}">${t.content}</span>
                        </div>
                        <div class="d-flex align-items-center">
                            <i class="fas fa-circle ms-2 small ${priorityColor}" style="font-size: 8px;"></i>
                            <button class="btn btn-link text-secondary ms-3 p-0" onclick="deleteTask('${t.id}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function addTask() {
            const content = document.getElementById('taskInput').value;
            const priority = document.getElementById('priorityInput').value;
            if (!content) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content, priority})
            });
            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        async function toggleTask(id, currentStatus) {
            if (!currentStatus) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8', '#fbbf24', '#f87171'] });
            }
            await fetch(`/api/tasks/${id}/toggle`, { method: 'PATCH' });
            loadTasks();
        }

        function filterTasks(type, el) {
            document.querySelectorAll('.nav-link').forEach(nav => nav.classList.remove('active'));
            el.classList.add('active');
            if (type === 'all') updateUI(allTasks);
            else if (type === 'pending') updateUI(allTasks.filter(t => !t.completed));
            else updateUI(allTasks.filter(t => t.completed));
        }

        async function deleteTask(id) {
            if(confirm("Xóa công việc này?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }
        loadTasks();
    </script>
</body>
</html>
