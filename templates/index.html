<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-add { border-radius: 8px; padding: 10px 25px; }
        .task-item { transition: all 0.3s; border-radius: 10px; margin-bottom: 10px; background: white; border-left: 5px solid #0d6efd; }
        .task-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card main-card p-4">
                    <h3 class="text-center mb-4 text-primary"><i class="fas fa-clipboard-list me-2"></i>QUẢN LÝ CÔNG VIỆC</h3>
                    
                    <div class="input-group mb-4">
                        <input type="text" id="taskInput" class="form-control" placeholder="Nhập việc cần làm..." style="padding: 12px;">
                        <button class="btn btn-primary btn-add" onclick="addTask()">Thêm việc</button>
                    </div>

                    <div id="taskList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(t => {
                list.innerHTML += `
                    <div class="task-item p-3 d-flex justify-content-between align-items-center border">
                        <span class="fw-bold">${t.content}</span>
                        <button class="btn btn-outline-danger btn-sm border-0" onclick="deleteTask('${t.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>`;
            });
        }

        async function addTask() {
            const content = document.getElementById('taskInput').value;
            if (!content) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content})
            });
            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        async function deleteTask(id) {
            if(confirm("Xóa việc này nhé?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }

        loadTasks();
    </script>
</body>
</html>
