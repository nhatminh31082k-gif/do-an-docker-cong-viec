<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; font-family: 'Inter', sans-serif; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .task-item { border-radius: 12px; border: none; margin-bottom: 12px; transition: 0.3s; background: white; border-left: 6px solid #ccc; }
        .task-item.priority-High { border-left-color: #ff4757; }
        .task-item.priority-Normal { border-left-color: #ffa502; }
        .task-item.priority-Low { border-left-color: #2ed573; }
        .completed { text-decoration: line-through; opacity: 0.6; }
        .badge-priority { font-size: 0.7rem; text-transform: uppercase; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card main-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold text-primary m-0"><i class="fas fa-rocket me-2"></i>TRẠM CÔNG VIỆC</h4>
                        <span class="badge bg-primary rounded-pill" id="taskCount">0 việc</span>
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-md-7">
                            <input type="text" id="taskInput" class="form-control form-control-lg" placeholder="Bạn muốn làm gì tiếp theo?">
                        </div>
                        <div class="col-md-3">
                            <select id="priorityInput" class="form-select form-control-lg">
                                <option value="Low">Thấp</option>
                                <option value="Normal" selected>Vừa</option>
                                <option value="High">Gấp!</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100 h-100" onclick="addTask()"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div id="taskList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            document.getElementById('taskCount').innerText = `${tasks.length} việc`;
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(t => {
                list.innerHTML += `
                    <div class="task-item p-3 d-flex justify-content-between align-items-center shadow-sm priority-${t.priority}">
                        <div class="d-flex align-items-center">
                            <input type="checkbox" class="form-check-input me-3" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}')">
                            <span class="${t.completed ? 'completed' : ''} fw-semibold">${t.content}</span>
                        </div>
                        <div>
                            <span class="badge badge-priority bg-light text-dark me-2">${t.priority}</span>
                            <button class="btn btn-link text-danger p-0" onclick="deleteTask('${t.id}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function addTask() {
            const content = document.getElementById('taskInput').value;
            const priority = document.getElementById('priorityInput').value;
            if (!content) return;
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content, priority})
            });
            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        async function toggleTask(id) {
            await fetch(`/api/tasks/${id}/toggle`, { method: 'PATCH' });
            loadTasks();
        }

        async function deleteTask(id) {
            if(confirm("Xóa nhé?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }
        loadTasks();
    </script>
</body>
</html>
